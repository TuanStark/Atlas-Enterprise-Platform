---
# Role 1: OS Hardening & K8s Kernel Tuning
- name: Tắt Memory SWAP (Yêu cầu bắt buộc của Kubelet)
  shell: |
    swapoff -a
    sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab

- name: Cấu hình Kernel Sysctl Parameters
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
    - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
    - { key: 'net.ipv4.ip_forward', value: '1' }
    - { key: 'vm.max_map_count', value: '262144' }
    - { key: 'fs.file-max', value: '2097152' }

- name: Cấu hình System Security Limits (/etc/security/limits.conf)
  pam_limits:
    domain: '*'
    limit_type: "{{ item.type }}"
    limit_item: "{{ item.item }}"
    value: "{{ item.value }}"
  loop:
    - { type: 'soft', item: 'nofile', value: '65535' }
    - { type: 'hard', item: 'nofile', value: '65535' }
    - { type: 'soft', item: 'nproc', value: '65535' }
    - { type: 'hard', item: 'nproc', value: '65535' }
